# Air configuration for Go hot reload during development
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Build command — same as the Makefile build target
  cmd = "go build -ldflags='-s -w' -o ./tmp/ocr-mcp ./cmd/server"
  # Binary to run
  bin = "tmp/ocr-mcp"
  # Files to watch for changes
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Directories to exclude
  exclude_dir = ["tmp", "vendor", ".git", "build", "services"]
  # Files to exclude (glob patterns)
  exclude_file = []
  # Exclude changed files that match these regex patterns
  exclude_regex = ["_test\\.go", ".*_test\\.go"]
  # Exclude unchanged files
  exclude_unchanged = true
  # Follow symlinks
  follow_symlink = false
  # Log build details
  log = "build-errors.log"
  # Delay before reloading (ms) — debounces rapid saves
  delay_ms = 500
  # Stop on build errors
  stop_on_error = true
  # Send interrupt signal before killing (for graceful shutdown)
  send_interrupt = true
  # Kill delay (ms) — time to wait for graceful shutdown before SIGKILL
  kill_delay = 3000

[log]
  # Show time in log output
  time = true
  # Only show file changes and errors (set to false for verbose)
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp_dir on exit
  clean_on_exit = true
